version: '3.8'

services:
  ionosphere:
    build: .
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_SETTINGS_JSON=/app/settings.json
      - GEMINI_HARDENED=true
    command: node src/index.js
    ports:
      - "3000:3000"
    volumes:
      - gemini-config:/root/.gemini

volumes:
  gemini-config:
