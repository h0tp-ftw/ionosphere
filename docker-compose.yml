version: "3.8"

services:
  ionosphere:
    build:
      context: .
      args:
        - GEMINI_DISABLE_TOOLS=${GEMINI_DISABLE_TOOLS:-false}
        - GEMINI_DISABLE_WEB_SEARCH=${GEMINI_DISABLE_WEB_SEARCH:-false}
    container_name: ionosphere
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      - GEMINI_SETTINGS_JSON=/app/settings.json
      - GEMINI_HARDENED=true
      - PORT=${PORT:-3000}
      - GEMINI_FORCE_FILE_STORAGE=true
      - STRIP_REASONING=${STRIP_REASONING:-false}
    command: node src/index.js
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - gemini-config:/root/.gemini
      - ${IONOSPHERE_TEMP_MOUNT_SOURCE:-./temp}:/app/temp

volumes:
  gemini-config:
