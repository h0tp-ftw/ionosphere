version: '3.8'

services:
  ionosphere:
    build: .
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_SETTINGS_JSON=/app/settings.json
      - GEMINI_HARDENED=true
      - GEMINI_DEBUG_HANDOFF=true
      - GEMINI_DEBUG_PROMPTS=true
      - GEMINI_DEBUG_RESPONSES=true
    command: node --watch src/index.js
    ports:
      - "3000:3000"
    volumes:
      - gemini-config:/root/.gemini
      - ./src:/app/src:z
      - ./scripts:/app/scripts:z
      - ./packages:/app/packages:z
      - ./temp:/app/temp:z

volumes:
  gemini-config:
