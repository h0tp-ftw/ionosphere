version: "3.8"

services:
  ionosphere:
    build:
      context: .
      args:
        - GEMINI_DISABLE_TOOLS=${GEMINI_DISABLE_TOOLS:-false}
        - GEMINI_DISABLE_WEB_SEARCH=${GEMINI_DISABLE_WEB_SEARCH:-false}
    container_name: ionosphere
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_AUTH_TYPE=${GEMINI_AUTH_TYPE}
      - GEMINI_SETTINGS_JSON=/app/settings.json
      - GEMINI_HARDENED=true
      - NO_BROWSER=${NO_BROWSER:-true}
      - GEMINI_CLI_NO_RELAUNCH=${GEMINI_CLI_NO_RELAUNCH:-true}
      - GOOGLE_GENAI_USE_GCA=${GOOGLE_GENAI_USE_GCA:-true}
      - GEMINI_DEBUG_HANDOFF=${GEMINI_DEBUG_HANDOFF:-true}
      - GEMINI_DEBUG_RESPONSES=${GEMINI_DEBUG_RESPONSES:-true}
      - GEMINI_DEBUG_IPC=${GEMINI_DEBUG_IPC:-true}
      - GEMINI_DEBUG_RAW=${GEMINI_DEBUG_RAW:-false}
      - GEMINI_MAX_TURNS=${GEMINI_MAX_TURNS:-50}
      - GEMINI_DEBUG_KEEP_TEMP=${GEMINI_DEBUG_KEEP_TEMP:-false}
      - WARM_HANDOFF_ENABLED=${WARM_HANDOFF_ENABLED:-false}
      - GEMINI_DEBUG_PARALLEL=${GEMINI_DEBUG_PARALLEL:-false}
      - GEMINI_DEBUG_CONTENT=${GEMINI_DEBUG_CONTENT:-false}
      - GEMINI_DEBUG_PROMPTS=${GEMINI_DEBUG_PROMPTS:-false}
      - GEMINI_DEBUG_FORENSICS=${GEMINI_DEBUG_FORENSICS:-false}
      - GEMINI_NUMERICAL_ROUTING_ENABLED=${GEMINI_NUMERICAL_ROUTING_ENABLED:-false}
      - PORT=${PORT:-3000}
      - CI=${CI:-true}
    command: node src/index.js
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - gemini-config:/root/.gemini
      - ${IONOSPHERE_TEMP_MOUNT_SOURCE:-./temp}:/app/temp

volumes:
  gemini-config:
